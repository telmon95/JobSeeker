# Render Blueprint — https://render.com/docs/blueprint-spec
# Dashboard: New > Blueprint > connect github.com/telmon95/JobSeeker
# Service URL will be: https://jobseeker-api.onrender.com (matches client/vercel.json)

services:
  - type: web
    name: jobseeker-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: ADZUNA_COUNTRY
        value: za
      - key: SCRAPE_MAX_PAGES
        value: "2"
      - key: FRONTEND_URL
        sync: false
